# ── coffeehome.ca ────────────────────────────────────────────

# HTTP — redirect all traffic to HTTPS
server {
    listen      80;
    server_name coffeehome.ca www.coffeehome.ca;
    return 301  https://coffeehome.ca$request_uri;
}

# HTTPS — redirect www to apex
server {
    listen      443 ssl;
    server_name www.coffeehome.ca;

    ssl_certificate     /etc/letsencrypt/live/coffeehome.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coffeehome.ca/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    return 301 https://coffeehome.ca$request_uri;
}

# HTTPS — proxy to app container
server {
    listen      443 ssl;
    server_name coffeehome.ca;

    ssl_certificate     /etc/letsencrypt/live/coffeehome.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coffeehome.ca/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    access_log /var/log/nginx/coffeehome.ca.access.log;
    error_log  /var/log/nginx/coffeehome.ca.error.log;

    location / {
        proxy_pass http://127.0.0.1:3010;
    }
}
