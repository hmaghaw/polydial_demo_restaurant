# ── islamic-heritage.ca ────────────────────────────────────────────

# HTTP — redirect all traffic to HTTPS
server {
    listen      80;
    server_name islamic-heritage.ca www.islamic-heritage.ca;
    return 301  https://islamic-heritage.ca$request_uri;
}

# HTTPS — redirect www to apex
server {
    listen      443 ssl;
    server_name www.islamic-heritage.ca;

    ssl_certificate     /etc/letsencrypt/live/islamic-heritage.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/islamic-heritage.ca/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    return 301 https://islamic-heritage.ca$request_uri;
}

# HTTPS — proxy to app container
server {
    listen      443 ssl;
    server_name islamic-heritage.ca;

    ssl_certificate     /etc/letsencrypt/live/islamic-heritage.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/islamic-heritage.ca/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    access_log /var/log/nginx/islamic-heritage.ca.access.log;
    error_log  /var/log/nginx/islamic-heritage.ca.error.log;

    location / {
        proxy_pass http://127.0.0.1:3012;
    }
}
