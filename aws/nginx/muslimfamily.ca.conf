# ── muslimfamily.ca ────────────────────────────────────────────

# HTTP — redirect all traffic to HTTPS
server {
    listen      80;
    server_name muslimfamily.ca www.muslimfamily.ca;
    return 301  https://muslimfamily.ca$request_uri;
}

# HTTPS — redirect www to apex
server {
    listen      443 ssl;
    server_name www.muslimfamily.ca;

    ssl_certificate     /etc/letsencrypt/live/muslimfamily.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/muslimfamily.ca/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    return 301 https://muslimfamily.ca$request_uri;
}

# HTTPS — proxy to app container
server {
    listen      443 ssl;
    server_name muslimfamily.ca;

    ssl_certificate     /etc/letsencrypt/live/muslimfamily.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/muslimfamily.ca/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    access_log /var/log/nginx/muslimfamily.ca.access.log;
    error_log  /var/log/nginx/muslimfamily.ca.error.log;

    location / {
        proxy_pass http://127.0.0.1:3013;
    }
}
