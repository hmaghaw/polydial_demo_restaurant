# ── wefind.ca ────────────────────────────────────────────

# HTTP — redirect all traffic to HTTPS
server {
    listen      80;
    server_name wefind.ca www.wefind.ca;
    return 301  https://wefind.ca$request_uri;
}

# HTTPS — redirect www to apex
server {
    listen      443 ssl;
    server_name www.wefind.ca;

    ssl_certificate     /etc/letsencrypt/live/wefind.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wefind.ca/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    return 301 https://wefind.ca$request_uri;
}

# HTTPS — proxy to app container
server {
    listen      443 ssl;
    server_name wefind.ca;

    ssl_certificate     /etc/letsencrypt/live/wefind.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wefind.ca/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    access_log /var/log/nginx/wefind.ca.access.log;
    error_log  /var/log/nginx/wefind.ca.error.log;

    location / {
        proxy_pass http://127.0.0.1:3014;
    }
}
