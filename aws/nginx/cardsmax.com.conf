# ── cardsmax.com ────────────────────────────────────────────

# HTTP — redirect all traffic to HTTPS
server {
    listen      80;
    server_name cardsmax.com www.cardsmax.com;
    return 301  https://cardsmax.com$request_uri;
}

# HTTPS — redirect www to apex
server {
    listen      443 ssl;
    server_name www.cardsmax.com;

    ssl_certificate     /etc/letsencrypt/live/cardsmax.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cardsmax.com/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    return 301 https://cardsmax.com$request_uri;
}

# HTTPS — proxy to app container
server {
    listen      443 ssl;
    server_name cardsmax.com;

    ssl_certificate     /etc/letsencrypt/live/cardsmax.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cardsmax.com/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    access_log /var/log/nginx/cardsmax.com.access.log;
    error_log  /var/log/nginx/cardsmax.com.error.log;

    location / {
        proxy_pass http://127.0.0.1:3015;
    }
}
