# /etc/nginx/sites-available/halalcooking.ca.conf

# HTTP — redirect everything to HTTPS (no ACME challenge needed with DNS-01)
server {
    listen 80;
    server_name halalcooking.ca www.halalcooking.ca;
    return 301 https://halalcooking.ca$request_uri;
}

# HTTPS — redirect www to apex
server {
    listen 443 ssl;
    server_name www.halalcooking.ca;

    ssl_certificate     /etc/letsencrypt/live/halalcooking.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/halalcooking.ca/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    return 301 https://halalcooking.ca$request_uri;
}

# HTTPS — proxy to app container
server {
    listen 443 ssl;
    server_name halalcooking.ca;

    ssl_certificate     /etc/letsencrypt/live/halalcooking.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/halalcooking.ca/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    access_log /var/log/nginx/halalcooking.ca.access.log;
    error_log  /var/log/nginx/halalcooking.ca.error.log;

    location / {
        proxy_pass http://127.0.0.1:3011;
    }
}
