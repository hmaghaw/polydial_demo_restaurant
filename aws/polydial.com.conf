# =====================================================
# Redirect HTTP to HTTPS for all subdomains
# =====================================================
server {
    listen 80;
    server_name api.polydial.com twilio-websocket.polydial.com n8n.polydial.com mcp.polydial.com
                admin.polydial.com restaurant.polydial.com customer.polydial.com egypt.polydial.com;

    return 301 https://$host$request_uri;
}


# ======================
# API Service (Port 5000)
# ======================
server {
    listen 443 ssl;
    server_name api.polydial.com;

    ssl_certificate     /home/ec2-user/.certbot/config/live/polydial.com/fullchain.pem;
    ssl_certificate_key /home/ec2-user/.certbot/config/live/polydial.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ==========================
# Twilio WebSocket Service (Port 8000)
# ==========================
server {
    listen 443 ssl;
    server_name twilio-websocket.polydial.com;

    ssl_certificate     /home/ec2-user/.certbot/config/live/polydial.com/fullchain.pem;
    ssl_certificate_key /home/ec2-user/.certbot/config/live/polydial.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Twilio webhook (HTTP request)
    location /voice {
        proxy_pass http://127.0.0.1:8000/voice;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /call-events {
        proxy_pass http://127.0.0.1:8000/call-events;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Twilio Media Stream WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:8000/ws;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_connect_timeout 3600;

        proxy_buffering off;
    }
}

# ==========================
# n8n Service (Port 5678)
# ==========================
server {
    listen 443 ssl;
    server_name n8n.polydial.com;

    ssl_certificate     /home/ec2-user/.certbot/config/live/polydial.com/fullchain.pem;
    ssl_certificate_key /home/ec2-user/.certbot/config/live/polydial.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 25m;

    location / {
        proxy_pass http://localhost:5678;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }
}

