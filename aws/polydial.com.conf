# ==========================
# Customer UI (Port 3002)
# ==========================
server {
    listen 443 ssl;
    server_name customer.polydial.com;

    ssl_certificate     /home/ec2-user/.certbot/config/live/polydial.com/fullchain.pem;
    ssl_certificate_key /home/ec2-user/.certbot/config/live/polydial.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Required: allow microphone access for voice ordering
    add_header Permissions-Policy "microphone=*" always;

    # Required: allow this page to be embedded as an iframe
    # on any restaurant website
    add_header X-Frame-Options "ALLOWALL" always;
    add_header Content-Security-Policy "frame-ancestors *" always;

    location / {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

