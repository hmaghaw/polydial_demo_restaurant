services:
  cardsmax:
    image: react-vite-app:latest
    container_name: cardsmax
    ports:
      - "3015:3015"
    volumes:
      - ./cardsmax:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --port 3015"
    restart: unless-stopped

  coffeehome:
    image: react-vite-app:latest
    container_name: coffeehome
